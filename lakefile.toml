name = "optisat"
version = "0.1.0"
keywords = ["equality-saturation", "e-graph", "verification"]
defaultTargets = ["LambdaSat"]

[leanOptions]
pp.unicode.fun = true
relaxedAutoImplicit = false

[[lean_lib]]
name = "LambdaSat"

[[lean_lib]]
name = "Tests"
globs = ["Tests"]

[[lean_exe]]
name = "integration-tests"
root = "Tests.IntegrationTests"
